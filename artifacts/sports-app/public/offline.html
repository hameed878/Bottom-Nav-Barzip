<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XRT — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
      text-align: center;
    }
    img { width: 100px; height: 100px; border-radius: 20px; }
    h1 { font-size: 24px; font-weight: 700; color: #f59e0b; }
    p { font-size: 15px; color: #94a3b8; max-width: 300px; line-height: 1.6; }
    button {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #1a1a2e;
      border: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <img src="/icon-192x192.png" alt="XRT Logo" />
  <h1>You're Offline</h1>
  <p>No internet connection detected. Please check your network and try again.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
